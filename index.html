<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30K iOS Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="header">
    <h1>💰 30K Tracker</h1>
    <p>Путь к 30 000 ₽</p>
  </div>

  <div class="card">

    <h2>Добавить смену</h2>

    <input type="date" id="date">

    <input type="number" id="hours" placeholder="Всего часов">

    <input type="number" id="orders" placeholder="Количество заказов">

    <button onclick="addShift()">Добавить смену</button>

  </div>

  <div class="card">

    <h2>Общий прогресс</h2>

    <div class="bar">
      <div id="progress"></div>
    </div>

    <p>💰 Всего: <b id="total">0</b> ₽</p>
    <p>🎯 Осталось: <b id="left">30000</b> ₽</p>

    <button class="danger" onclick="resetAll()">Сбросить всё</button>

  </div>

  <div class="card">
    <h2>История смен</h2>
    <div id="history"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
